version: 2

before:
  hooks:
    - bash cmd/tokamak-deployer/scripts/extract-artifacts.sh \
        packages/tokamak/contracts-bedrock/forge-artifacts \
        cmd/tokamak-deployer/deploy-artifacts

builds:
  - id: tokamak-deployer
    dir: cmd/tokamak-deployer
    main: .
    binary: tokamak-deployer
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: tokamak-deployer
    name_template: "tokamak-deployer-{{ .Os }}-{{ .Arch }}"
    formats: [binary]

checksum:
  name_template: "checksums.txt"
