name: Publish the Thanos Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'release-*'
    branches: [main]
    paths:
      - 'packages/tokamak/contracts-bedrock/src/**'
      - 'packages/tokamak/contracts-bedrock/foundry.toml'
      - 'packages/tokamak/contracts-bedrock/package.json'
      - 'packages/tokamak/sdk/src/**'
      - 'packages/tokamak/sdk/package.json'
      - 'packages/tokamak/core-utils/src/**'
      - 'packages/tokamak/core-utils/package.json'

jobs:
  release-thanos-packages:
    name: Release
    runs-on: ubuntu-latest
    container:
      image: tokamaknetwork/thanos-ci-builder:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Add repository to git safe directories
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Restore PNPM Package Cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: pnpm-packages-v2-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Fetch dependencies
        run: pnpm fetch --frozen-lockfile --prefer-offline

      - name: Save PNPM Package Cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: pnpm-packages-v2-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --offline

      - name: Build
        run: pnpm build

      - name: Create .npmrc
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" > .npmrc

      - name: Determine release type
        id: release-type
        run: |
          if [[ "${{ github.ref }}" == refs/tags/release-* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "npm_tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set dev versions
        if: steps.release-type.outputs.is_release == 'false'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PACKAGES=(
            "packages/tokamak/contracts-bedrock"
            "packages/tokamak/sdk"
            "packages/tokamak/core-utils"
          )
          for PKG_DIR in "${PACKAGES[@]}"; do
            if [ -f "$PKG_DIR/package.json" ]; then
              BASE_VERSION=$(node -p "require('./$PKG_DIR/package.json').version")
              DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
              echo "Setting $PKG_DIR to version $DEV_VERSION"
              cd "$PKG_DIR"
              npm version "$DEV_VERSION" --no-git-tag-version
              cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: Filter packages to publish
        id: filter-packages
        run: |
          # Define the package names to publish
          PACKAGES_TO_PUBLISH=("@tokamak-network/thanos-sdk @tokamak-network/thanos-contracts @tokamak-network/core-utils")
          # Set the output variables for packages to publish
          echo "packages-to-publish=${PACKAGES_TO_PUBLISH[@]}" >> $GITHUB_OUTPUT

      - name: Print Git changes
        run: git diff

      - name: Publish Packages
        run: |
          NPM_TAG="${{ steps.release-type.outputs.npm_tag }}"
          for PACKAGE in ${{ steps.filter-packages.outputs.packages-to-publish }}; do
            echo "Publishing $PACKAGE with tag: $NPM_TAG"
            if pnpm publish --filter=$PACKAGE --access public --tag "$NPM_TAG" --no-git-checks; then
              echo "Package $PACKAGE published successfully!"
            else
              echo "Skipping package $PACKAGE publishing as it encountered an error."
            fi
          done
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
