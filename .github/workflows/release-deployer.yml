name: Release tokamak-deployer

on:
  push:
    tags:
      - 'tokamak-deployer-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Clear Foundry cache (prevent cache corruption hangs)
        run: rm -rf ~/.foundry/cache

      - name: Build contracts (for artifact extraction)
        working-directory: packages/tokamak/contracts-bedrock
        run: forge build

      - name: Clean up build artifacts before release
        run: |
          git checkout pnpm-lock.yaml
          rm -f packages/tokamak/contracts-bedrock/foundry.lock
          git status

      - name: Extract version from tag
        run: |
          TAG=${{ github.ref_name }}
          # Extract version from tokamak-deployer-vX.Y.Z -> vX.Y.Z
          VERSION=${TAG#tokamak-deployer-}
          echo "GORELEASER_CURRENT_TAG=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION from tag: $TAG"

      - uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean --skip-validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.GORELEASER_CURRENT_TAG }}
