name: Release tokamak-deployer

on:
  push:
    tags:
      - 'tokamak-deployer/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Clear Foundry cache (prevent cache corruption hangs)
        run: rm -rf ~/.foundry/cache

      - name: Build contracts (for artifact extraction)
        working-directory: packages/tokamak/contracts-bedrock
        run: forge build

      - name: Clean up build artifacts before release
        run: |
          git checkout pnpm-lock.yaml
          rm -f packages/tokamak/contracts-bedrock/foundry.lock
          git status

      - name: Extract version from tag
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#tokamak-deployer/}
          echo "GORELEASER_CURRENT_TAG=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG" >> $GITHUB_ENV
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Build binaries (no publish)
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean --skip=publish,validate
        env:
          GORELEASER_CURRENT_TAG: ${{ env.GORELEASER_CURRENT_TAG }}

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --prerelease \
            --notes "Release $TAG_NAME" \
            dist/tokamak-deployer-darwin-amd64.tar.gz \
            dist/tokamak-deployer-darwin-arm64.tar.gz \
            dist/tokamak-deployer-linux-amd64.tar.gz \
            dist/tokamak-deployer-linux-arm64.tar.gz \
            dist/checksums.txt
